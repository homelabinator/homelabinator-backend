name: Deploy Backend

on:
  push:
    branches:
      - "*"

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          submodules: "true"

      - name: Deploy to remote
        env:
          REMOTE_USER: snowflake
          REMOTE_HOST: 0.0.0.0
          REMOTE_BASE_DIR: homelabinator-backend
        run: |
          REMOTE_TARGET_DIR="${REMOTE_BASE_DIR}/${{ env.BRANCH_NAME }}"
          ssh "${REMOTE_USER}@${REMOTE_HOST}" "rm -rf ${REMOTE_TARGET_DIR}"
          rsync -avz --exclude '.**' --exclude '.*' ./ "${REMOTE_USER}@${REMOTE_HOST}:${REMOTE_TARGET_DIR}/"
          ssh "${REMOTE_USER}@${REMOTE_HOST}" "tmux kill-session -t flask-api 2>/dev/null || true"
          ssh "${REMOTE_USER}@${REMOTE_HOST}" "tmux new-session -d -s flask-api \"cd ~/homelabinator-backend/api && nix-shell -p python3 python313Packages.jinja2 python313Packages.flask python313Packages.python-dotenv --command 'python3 app.py'\""
          ssh "${REMOTE_USER}@${REMOTE_HOST}" "tmux split-window -t flask-api 'cd ~/homelabinator-backend/api/isos && python3 -m http.server'"
